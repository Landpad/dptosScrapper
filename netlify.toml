[build]
  command = "npm run build"
  publish = "dist"

# Redirige /ml-oauth a la Function (igual URL que el proxy de Vite en dev)
[[redirects]]
  from = "/ml-oauth"
  to = "/.netlify/functions/ml-oauth"
  status = 200

# SPA fallback para React Router (si lo usás en el futuro)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
