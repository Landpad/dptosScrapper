[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "functions"

[[redirects]]
  from = "/ml-oauth"
  to = "/.netlify/functions/ml-oauth"
  status = 200

[[redirects]]
  from = "/ml-search"
  to = "/.netlify/functions/ml-search"
  status = 200

[[redirects]]
  from = "/ml-debug"
  to = "/.netlify/functions/ml-debug"
  status = 200

# SPA fallback para React Router (si lo usás en el futuro)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
